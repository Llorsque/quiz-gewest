<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quiz Scorebord</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --indigo-900: #1e1b4b;
    --indigo-700: #3730a3;
    --indigo-500: #6366f1;
    --indigo-300: #a5b4fc;
    --indigo-100: #e0e7ff;
    --indigo-50:  #eef2ff;
    --slate-400:  #94a3b8;
    --slate-200:  #e2e8f0;
    --slate-100:  #f1f5f9;
    --gold:   #f5a623;
    --silver: #a8a8a8;
    --bronze: #cd7f32;
    --green:  #10b981;
    --red:    #ef4444;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,.08);
  }
  body { font-family: 'Outfit', sans-serif; background: var(--slate-100); color: var(--indigo-900); }
  button { font-family: 'Outfit', sans-serif; cursor: pointer; }
  input  { font-family: 'Outfit', sans-serif; }

  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  /* ════════════════════════════════
     ADMIN
  ════════════════════════════════ */
  .admin-header {
    background: var(--indigo-900);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(30,27,75,.3);
  }
  .admin-header .logo { color: #c7d2fe; font-weight: 800; font-size: 18px; letter-spacing: -.3px; }
  .admin-header-btns { display: flex; gap: 10px; }
  .btn-display {
    background: var(--indigo-500); color: #fff; border: none;
    padding: 9px 20px; border-radius: 8px; font-weight: 700; font-size: 14px;
    transition: background .15s;
  }
  .btn-display:hover { background: var(--indigo-700); }
  .btn-reset {
    background: transparent; color: var(--red); border: 1.5px solid var(--red);
    padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 14px;
  }
  .btn-reset:hover { background: #fef2f2; }

  .admin-body { max-width: 1080px; margin: 0 auto; padding: 28px 20px 60px; }

  .card {
    background: #fff; border-radius: var(--radius); padding: 24px 28px;
    margin-bottom: 18px; box-shadow: var(--shadow);
    border: 1.5px solid var(--indigo-100);
  }
  .card h2 { font-size: 15px; font-weight: 800; color: var(--indigo-900); margin-bottom: 18px; letter-spacing: -.2px; }

  .setup-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 14px; align-items: end; }
  @media(max-width:600px){ .setup-grid { grid-template-columns: 1fr 1fr; } }

  label.field { display: flex; flex-direction: column; gap: 5px; font-size: 13px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; letter-spacing: .6px; }
  label.field input {
    border: 1.5px solid var(--indigo-100); border-radius: 8px;
    padding: 9px 12px; font-size: 15px; font-weight: 600; color: var(--indigo-900);
    outline: none; transition: border .15s;
  }
  label.field input:focus { border-color: var(--indigo-500); }

  .btn-primary {
    background: linear-gradient(135deg, var(--indigo-700), var(--indigo-500));
    color: #fff; border: none; padding: 10px 22px; border-radius: 8px;
    font-weight: 700; font-size: 14px; white-space: nowrap; height: 41px;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .88; }

  .team-add-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .team-add-row input {
    flex: 1; border: 1.5px solid var(--indigo-100); border-radius: 8px;
    padding: 9px 14px; font-size: 15px; font-weight: 600; color: var(--indigo-900); outline: none;
  }
  .team-add-row input:focus { border-color: var(--indigo-500); }
  .teams-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .team-chip {
    background: var(--indigo-50); border: 1.5px solid var(--indigo-100);
    border-radius: 99px; padding: 6px 8px 6px 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .team-chip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .team-chip input {
    border: none; background: transparent; outline: none;
    font-size: 14px; font-weight: 700; color: var(--indigo-900);
    width: 110px; font-family: 'Outfit', sans-serif;
  }
  .team-chip .remove {
    background: none; border: none; color: var(--slate-400);
    font-size: 18px; line-height: 1; padding: 0 4px; transition: color .1s;
  }
  .team-chip .remove:hover { color: var(--red); }
  .empty-note { color: var(--slate-400); font-size: 14px; }

  .score-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 480px; }
  th { padding: 9px 8px; font-size: 11px; font-weight: 800; color: var(--slate-400);
       text-transform: uppercase; letter-spacing: .8px; border-bottom: 2px solid var(--indigo-100);
       text-align: center; }
  th.left { text-align: left; }
  td { padding: 8px; border-bottom: 1px solid var(--indigo-100); vertical-align: middle; }
  tr:nth-child(even) td { background: var(--indigo-50); }
  td.team-name-cell { font-weight: 700; font-size: 14px; padding-left: 14px; }
  td.total-cell { font-weight: 900; font-size: 19px; color: var(--indigo-500); text-align: center; }
  .score-input {
    width: 58px; text-align: center; border: 1.5px solid var(--indigo-100);
    border-radius: 7px; padding: 6px 4px; font-size: 14px; font-weight: 700;
    color: var(--indigo-900); background: #fff; outline: none;
    font-family: 'DM Mono', monospace; transition: border .15s;
  }
  .score-input:focus { border-color: var(--indigo-500); }
  .score-input.revealed { background: #f0fdf4; border-color: #bbf7d0; }
  .round-head { text-align: center; }
  .round-head .badge { display: block; font-size: 9px; font-weight: 700; color: var(--green); letter-spacing: .5px; margin-top: 1px; }

  .present-section { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .present-status { font-size: 15px; color: var(--slate-400); }
  .present-status strong { color: var(--indigo-700); }
  .btn-reveal {
    background: linear-gradient(135deg,#312e81,var(--indigo-500));
    color: #fff; border: none; padding: 15px 38px; border-radius: 12px;
    font-weight: 900; font-size: 18px; letter-spacing: -.3px;
    box-shadow: 0 8px 28px rgba(99,102,241,.35);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-reveal:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(99,102,241,.45); }
  .btn-reveal:disabled { background: var(--slate-200); color: var(--slate-400); box-shadow: none; cursor: not-allowed; }
  .btn-prev {
    background: none; border: 1.5px solid var(--slate-200); color: var(--slate-400);
    padding: 14px 18px; border-radius: 10px; font-size: 14px; font-weight: 600;
  }
  .btn-prev:hover { border-color: var(--indigo-300); color: var(--indigo-500); }

  /* ════════════════════════════════
     DISPLAY PAGE
  ════════════════════════════════ */
  #page-display {
    background: linear-gradient(160deg,#f8faff 0%,#eef2ff 50%,#e0e7ff 100%);
    min-height: 100vh; position: relative; overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(99,102,241,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(99,102,241,.05) 1px,transparent 1px);
    background-size: 48px 48px;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: .35; }
  .bg-blob-1 { width: 500px; height: 500px; background: #c7d2fe; top: -180px; right: -100px; }
  .bg-blob-2 { width: 400px; height: 400px; background: #ddd6fe; bottom: -120px; left: -80px; }

  .display-header {
    background: linear-gradient(90deg,#1e1b4b 0%,#312e81 55%,#4338ca 100%);
    padding: clamp(18px,3vw,32px) clamp(20px,5vw,64px);
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 40px rgba(67,56,202,.3);
    position: relative; z-index: 10;
  }
  .display-header .subtitle {
    color: rgba(199,210,254,.65); font-size: 12px; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 4px; font-weight: 600;
  }
  .display-header h1 {
    color: #fff; font-weight: 900; font-size: clamp(26px,4.5vw,56px);
    letter-spacing: -1px; line-height: 1;
  }
  .display-header h1 .round-num   { color: #818cf8; }
  .display-header h1 .round-total { color: rgba(255,255,255,.35); font-size: .55em; }
  .btn-to-admin {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: rgba(255,255,255,.6); padding: 8px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: .5px; flex-shrink: 0;
  }
  .btn-to-admin:hover { background: rgba(255,255,255,.18); }

  /* ── Scoreboard: relative container; tiles anchor to it ── */
  .scoreboard-wrap {
    position: relative; z-index: 5;
    padding: clamp(20px,3.5vw,44px) clamp(20px,5vw,60px) 80px;
    max-width: 1140px; margin: 0 auto;
  }
  #scoreboard {
    position: relative;
    width: 100%;
    transition: height 0.9s cubic-bezier(.34,1.1,.64,1);
  }

  /* ── Team tile: absolutely positioned, moves via `top` ── */
  .score-tile {
    position: absolute;
    left: 0; right: 0;
    /* top + height set by JS */
    opacity: 0;
    transform: translateX(-80px);
    /* Entry animation (opacity + X).
       After .live is added, only `top` transitions for rank slides. */
    transition: top 0.9s cubic-bezier(.34,1.1,.64,1),
                opacity 0.4s ease,
                transform 0.4s ease;
    will-change: top, opacity, transform;
  }
  .score-tile.live {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── Visual card inside the tile ── */
  .score-card {
    height: 100%;
    display: flex; align-items: center; gap: 20px;
    padding: 0 24px;
    background: rgba(255,255,255,.8);
    backdrop-filter: blur(16px);
    border-radius: 18px;
    border: 1.5px solid rgba(255,255,255,.9);
    box-shadow: 0 2px 14px rgba(0,0,0,.07);
    transition: background 0.7s, border-color 0.7s, box-shadow 0.7s;
  }
  .score-card.rank-1 {
    background: linear-gradient(90deg,rgba(245,166,35,.16),rgba(245,166,35,.05));
    border-color: rgba(245,166,35,.5);
    box-shadow: 0 6px 32px rgba(245,166,35,.22), 0 2px 10px rgba(0,0,0,.07);
  }

  .rank-badge {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px;
    border: 2.5px solid var(--slate-200); color: var(--slate-400);
    transition: width .6s, height .6s, font-size .6s,
                border-color .6s, color .6s, background .6s;
  }
  .rank-badge.r1 {
    width: 52px; height: 52px; font-size: 22px;
    border-color: var(--gold); color: var(--gold);
    background: radial-gradient(circle,rgba(245,166,35,.24),rgba(245,166,35,.04));
  }
  .rank-badge.r2 {
    border-color: var(--silver); color: var(--silver);
    background: radial-gradient(circle,rgba(168,168,168,.18),transparent);
  }
  .rank-badge.r3 {
    border-color: var(--bronze); color: var(--bronze);
    background: radial-gradient(circle,rgba(205,127,50,.18),transparent);
  }

  .score-main { flex: 1; min-width: 0; }
  .team-label {
    font-weight: 800; color: var(--indigo-900); margin-bottom: 7px;
    font-size: clamp(14px,2vw,22px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -.2px;
  }

  .bar-track {
    height: 14px; background: rgba(99,102,241,.09);
    border-radius: 99px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px; width: 0%;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    /* width transition injected by JS */
  }

  .score-pts {
    font-weight: 900; font-size: clamp(22px,2.8vw,38px); color: var(--indigo-500);
    flex-shrink: 0; text-align: right; letter-spacing: -1px; min-width: 58px;
    transition: color .7s;
  }
  .score-card.rank-1 .score-pts { color: var(--gold); }
  .score-pts span { font-size: .42em; font-weight: 600; color: var(--slate-400); margin-left: 2px; }

  .waiting {
    text-align: center; padding-top: 80px;
    color: var(--indigo-500); font-size: 22px; opacity: .5; font-weight: 600;
  }
</style>
</head>
<body>

<!-- ═══════════ ADMIN PAGE ═══════════ -->
<div id="page-admin" class="page">
  <header class="admin-header">
    <div class="logo">🎯 Quiz Admin</div>
    <div class="admin-header-btns">
      <button class="btn-display" onclick="openDisplay()">📺 Open Scorebord</button>
      <button class="btn-reset"   onclick="resetAll()">Reset</button>
    </div>
  </header>

  <div class="admin-body">

    <div class="card">
      <h2>⚙️ Instellingen</h2>
      <div class="setup-grid">
        <label class="field">Quiz naam
          <input type="text" id="inp-title" value="Pub Quiz"/>
        </label>
        <label class="field">Aantal rondes
          <input type="number" id="inp-rounds" value="6" min="1" max="20" style="width:100px"/>
        </label>
        <button class="btn-primary" onclick="applySetup()">Toepassen</button>
      </div>
    </div>

    <div class="card">
      <h2>👥 Teams</h2>
      <div class="team-add-row">
        <input type="text" id="inp-new-team" placeholder="Teamnaam…" onkeydown="if(event.key==='Enter')addTeam()"/>
        <button class="btn-primary" onclick="addTeam()">+ Team</button>
      </div>
      <div class="teams-list" id="teams-list">
        <span class="empty-note">Nog geen teams aangemaakt.</span>
      </div>
    </div>

    <div class="card" id="scores-card" style="display:none">
      <h2>📝 Punten invoeren</h2>
      <div class="score-wrap">
        <table id="scores-table"><tbody></tbody></table>
      </div>
    </div>

    <div class="card" id="present-card" style="display:none">
      <h2>🎬 Presenteer stand</h2>
      <div class="present-section">
        <div class="present-status">
          Gepresenteerd: <strong id="revealed-label">0 / 0</strong> rondes
        </div>
        <button class="btn-reveal" id="btn-reveal" onclick="revealNext()">🚀 Presenteer ronde 1</button>
        <button class="btn-prev"   id="btn-prev"   onclick="revealPrev()" style="display:none">← Vorige</button>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════ DISPLAY PAGE ═══════════ -->
<div id="page-display" class="page">
  <div class="bg-grid"></div>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <header class="display-header">
    <div>
      <div class="subtitle" id="d-quiz-title">Pub Quiz</div>
      <h1>
        Stand na <span class="round-num" id="d-round-num">0</span>
        <span class="round-total" id="d-round-total">/6</span>
        rondes
      </h1>
    </div>
    <button class="btn-to-admin" onclick="goAdmin()">⚙ Admin</button>
  </header>

  <div class="scoreboard-wrap">
    <div id="scoreboard">
      <div class="waiting">Wacht op de eerste ronde…</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// SLOT DIMENSIONS  (keep in sync with CSS vars)
// ═══════════════════════════════════════════════════════
const SLOT_H   = 82;   // px per tile
const SLOT_GAP = 12;   // px between tiles

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'quiz_state_v3';
const BC_CHANNEL  = 'quiz_sync';

let state = {
  quizTitle:     'Pub Quiz',
  totalRounds:   6,
  teams:         [],
  revealedRound: 0,
  setupDone:     false,
};

const BAR_COLOURS = [
  '#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6',
  '#EC4899','#06B6D4','#84CC16','#F97316','#6366F1',
  '#14B8A6','#E11D48',
];

let bc;
try { bc = new BroadcastChannel(BC_CHANNEL); } catch(e) {}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (bc) bc.postMessage({ type: 'state', state });
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch(e) {}
}

if (bc) {
  bc.onmessage = (e) => {
    if (e.data?.type === 'state') {
      state = e.data.state;
      if (currentPage() === 'display') renderDisplay();
    }
  };
}
window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY && e.newValue) {
    try {
      state = JSON.parse(e.newValue);
      if (currentPage() === 'display') renderDisplay();
    } catch(e) {}
  }
});

// ═══════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════
function currentPage() { return location.hash === '#display' ? 'display' : 'admin'; }

function showPage(name) {
  document.getElementById('page-admin').classList.toggle('active', name === 'admin');
  document.getElementById('page-display').classList.toggle('active', name === 'display');
  if (name === 'admin')   renderAdmin();
  if (name === 'display') renderDisplay();
}
function openDisplay() { window.open(location.href.split('#')[0] + '#display', '_blank'); }
function goAdmin()      { location.hash = '#admin'; }
window.addEventListener('hashchange', () => showPage(currentPage()));

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function totalFor(team, upTo) {
  return team.scores.slice(0, upTo).reduce((s, v) => s + (Number(v) || 0), 0);
}
function getRanked(round) {
  return [...state.teams]
    .map(t => ({ ...t, total: totalFor(t, round) }))
    .sort((a, b) => b.total - a.total);
}
function teamColour(teamId) {
  const idx = state.teams.findIndex(t => t.id === teamId);
  return BAR_COLOURS[idx % BAR_COLOURS.length];
}
function topForRank(idx) { return idx * (SLOT_H + SLOT_GAP); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
// ADMIN ACTIONS
// ═══════════════════════════════════════════════════════
function applySetup() {
  const title  = document.getElementById('inp-title').value.trim() || 'Pub Quiz';
  const rounds = Math.max(1, Math.min(20, parseInt(document.getElementById('inp-rounds').value) || 6));
  state.quizTitle   = title;
  state.totalRounds = rounds;
  state.setupDone   = true;
  state.teams = state.teams.map(t => {
    const s = [...t.scores];
    while (s.length < rounds) s.push('');
    return { ...t, scores: s.slice(0, rounds) };
  });
  saveState(); renderAdmin();
}

function addTeam() {
  const inp = document.getElementById('inp-new-team');
  const name = inp.value.trim();
  if (!name) return;
  state.teams.push({ id: Date.now(), name, scores: Array(state.totalRounds).fill('') });
  inp.value = '';
  saveState(); renderAdmin(); inp.focus();
}

function removeTeam(id) {
  state.teams = state.teams.filter(t => t.id !== id);
  saveState(); renderAdmin();
}

function renameTeam(id, name) {
  const t = state.teams.find(t => t.id === id);
  if (t) { t.name = name; saveState(); }
}

function setScore(teamId, roundIdx, val) {
  const t = state.teams.find(t => t.id === teamId);
  if (!t) return;
  t.scores[roundIdx] = val === '' ? '' : (Number(val) || 0);
  saveState();
  const el = document.getElementById('total-' + teamId);
  if (el) el.textContent = totalFor(t, state.totalRounds);
}

function revealNext() {
  if (state.revealedRound < state.totalRounds) {
    state.revealedRound++;
    saveState(); renderAdmin();
  }
}

function revealPrev() {
  if (state.revealedRound > 0) {
    state.revealedRound--;
    saveState(); renderAdmin();
  }
}

function resetAll() {
  if (!confirm('Weet je zeker dat je alles wilt resetten?')) return;
  // Remove all existing tiles from DOM
  Object.values(tileMap).forEach(({ el }) => el.remove());
  tileMap = {};
  state = { quizTitle: 'Pub Quiz', totalRounds: 6, teams: [], revealedRound: 0, setupDone: false };
  saveState();
  document.getElementById('inp-title').value  = 'Pub Quiz';
  document.getElementById('inp-rounds').value = '6';
  renderAdmin();
  if (currentPage() === 'display') renderDisplay();
}

// ═══════════════════════════════════════════════════════
// RENDER ADMIN
// ═══════════════════════════════════════════════════════
function renderAdmin() {
  const list = document.getElementById('teams-list');
  if (state.teams.length === 0) {
    list.innerHTML = '<span class="empty-note">Nog geen teams aangemaakt.</span>';
  } else {
    list.innerHTML = state.teams.map((t, i) => `
      <div class="team-chip">
        <div class="dot" style="background:${BAR_COLOURS[i % BAR_COLOURS.length]}"></div>
        <input type="text" value="${esc(t.name)}"
          onchange="renameTeam(${t.id},this.value)"
          onblur="renameTeam(${t.id},this.value)"/>
        <button class="remove" onclick="removeTeam(${t.id})">×</button>
      </div>`).join('');
  }

  const scoresCard  = document.getElementById('scores-card');
  const presentCard = document.getElementById('present-card');
  if (state.teams.length === 0) {
    scoresCard.style.display = presentCard.style.display = 'none';
    return;
  }
  scoresCard.style.display = presentCard.style.display = '';

  const cols  = Array.from({ length: state.totalRounds }, (_, i) => i);
  const thead = `<thead><tr>
    <th class="left">Team</th>
    ${cols.map(r => `<th class="round-head">R${r+1}${r < state.revealedRound ? '<span class="badge">✓</span>' : ''}</th>`).join('')}
    <th>Totaal</th>
  </tr></thead>`;

  const tbody = state.teams.map((t, ti) => `
    <tr>
      <td class="team-name-cell"><span style="color:${BAR_COLOURS[ti%BAR_COLOURS.length]};margin-right:6px">●</span>${esc(t.name)}</td>
      ${cols.map(r => `
        <td style="text-align:center">
          <input type="number" class="score-input${r < state.revealedRound ? ' revealed' : ''}"
            value="${t.scores[r] !== '' ? t.scores[r] : ''}"
            onchange="setScore(${t.id},${r},this.value)"
            onblur="setScore(${t.id},${r},this.value)"
            onkeydown="if(event.key==='Enter')setScore(${t.id},${r},this.value)"/>
        </td>`).join('')}
      <td class="total-cell" id="total-${t.id}">${totalFor(t, state.totalRounds)}</td>
    </tr>`).join('');

  document.getElementById('scores-table').innerHTML = thead + '<tbody>' + tbody + '</tbody>';

  document.getElementById('revealed-label').textContent = `${state.revealedRound} / ${state.totalRounds}`;
  const btnReveal = document.getElementById('btn-reveal');
  const btnPrev   = document.getElementById('btn-prev');
  const canReveal = state.revealedRound < state.totalRounds;
  btnReveal.disabled = !canReveal;
  btnReveal.textContent =
    state.revealedRound === 0 ? '🚀 Presenteer stand na ronde 1' :
    canReveal                 ? `📊 Presenteer stand na ronde ${state.revealedRound + 1}` :
                                '✅ Alle rondes gepresenteerd';
  btnPrev.style.display = state.revealedRound > 0 ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
// DISPLAY — absolute-positioned tiles, slide on rank change
// ═══════════════════════════════════════════════════════

// tileMap: teamId (number) → { el: HTMLElement, barEl: HTMLElement }
let tileMap = {};

function renderDisplay() {
  const { quizTitle, totalRounds, revealedRound, teams } = state;

  document.getElementById('d-quiz-title').textContent  = quizTitle;
  document.getElementById('d-round-num').textContent   = revealedRound;
  document.getElementById('d-round-total').textContent = '/' + totalRounds;

  const board = document.getElementById('scoreboard');

  // Nothing to show yet
  if (revealedRound === 0 || teams.length === 0) {
    // Clear any live tiles
    Object.values(tileMap).forEach(({ el }) => el.remove());
    tileMap = {};
    board.innerHTML = '<div class="waiting">Wacht op de eerste ronde…</div>';
    board.style.height = 'auto';
    return;
  }

  // Remove waiting message if still present
  const w = board.querySelector('.waiting');
  if (w) w.remove();

  const ranked = getRanked(revealedRound);
  const maxPts = Math.max(...ranked.map(t => t.total), 1);
  const boardH = ranked.length * SLOT_H + (ranked.length - 1) * SLOT_GAP;
  board.style.height = boardH + 'px';

  ranked.forEach((team, idx) => {
    const colour  = teamColour(team.id);
    const rankCls = idx === 0 ? 'r1' : idx === 1 ? 'r2' : idx === 2 ? 'r3' : '';
    const barPct  = (team.total / maxPts * 100).toFixed(1);
    const newTop  = topForRank(idx);

    if (tileMap[team.id]) {
      // ── EXISTING TILE: just move it ─────────────────
      const { el, barEl } = tileMap[team.id];

      // Update top → CSS transition slides the tile to its new rank position
      el.style.top = newTop + 'px';

      // Update visuals that change with rank
      el.querySelector('.score-card').className  = 'score-card' + (idx === 0 ? ' rank-1' : '');
      el.querySelector('.rank-badge').className  = 'rank-badge ' + rankCls;
      el.querySelector('.rank-badge').textContent = idx + 1;
      el.querySelector('.score-pts').innerHTML   = team.total + '<span>pt</span>';

      // Animate bar AFTER the slide (0.9s) settles
      setTimeout(() => {
        barEl.style.transition = 'width 1.1s cubic-bezier(.22,1,.36,1)';
        barEl.style.width = barPct + '%';
      }, 950);

    } else {
      // ── NEW TILE: create, place, then fly in ────────
      const el = document.createElement('div');
      el.className  = 'score-tile';
      el.id         = 'tile-' + team.id;
      el.style.top  = newTop + 'px';
      el.style.height = SLOT_H + 'px';
      el.innerHTML  = `
        <div class="score-card${idx === 0 ? ' rank-1' : ''}">
          <div class="rank-badge ${rankCls}">${idx + 1}</div>
          <div class="score-main">
            <div class="team-label">${esc(team.name)}</div>
            <div class="bar-track">
              <div class="bar-fill" id="bar-${team.id}"
                style="background:linear-gradient(90deg,${colour}cc,${colour});
                       box-shadow:0 2px 10px ${colour}55;width:0%"></div>
            </div>
          </div>
          <div class="score-pts">${team.total}<span>pt</span></div>
        </div>`;
      board.appendChild(el);

      const barEl = el.querySelector('.bar-fill');
      tileMap[team.id] = { el, barEl };

      // Stagger the fly-in, then grow the bar
      const delay = idx * 120;
      setTimeout(() => {
        el.classList.add('live');
        setTimeout(() => {
          barEl.style.transition = 'width 1.1s cubic-bezier(.22,1,.36,1)';
          barEl.style.width = barPct + '%';
        }, 400);
      }, delay);
    }
  });

  // Clean up tiles for removed teams
  const activeIds = new Set(teams.map(t => t.id));
  Object.keys(tileMap).forEach(id => {
    if (!activeIds.has(Number(id))) {
      tileMap[id].el.remove();
      delete tileMap[id];
    }
  });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadState();
document.getElementById('inp-title').value  = state.quizTitle;
document.getElementById('inp-rounds').value = state.totalRounds;
showPage(currentPage());
</script>
